# CI / CD for the VSCode extension.
#
# Pipeline: Lint & Audit -> Testing -> Build -> Publish Marketplace.
#
# Publish Marketplace runs only when ALL of these are true:
#   1. The event is a push to `main` (i.e. merged PRs or direct pushes).
#   2. The head commit message does NOT contain `[skip release]`.
#   3. The repository has the `VSCE_PAT` secret configured.
#
# If `VSCE_PAT` is missing (e.g. on the boilerplate repo itself), the
# publish job is reported as skipped. To enable publishing on a downstream
# project, add a `VSCE_PAT` repository secret: an Azure DevOps Personal
# Access Token with `Marketplace > Manage` scope.
# See https://code.visualstudio.com/api/working-with-extensions/publishing-extension#get-a-personal-access-token
#
# When publish runs, `semantic-release` reads Conventional Commits since
# the last tag to compute the next version, updates the CHANGELOG, commits
# and tags the release, publishes via `vsce`, and creates a GitHub Release.
# The release commit is created by `github-actions[bot]` with `[skip ci]`
# in its subject so the follow-up push to `main` does not re-trigger CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-audit:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm run format:check
      - run: npm audit --audit-level=high

  testing:
    name: Testing
    runs-on: ubuntu-latest
    needs: lint-and-audit
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: testing
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  check-publish-config:
    name: Check Publish Config
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip release]')
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "VSCE_PAT is configured -- publish will run."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "VSCE_PAT is not configured -- publish will be skipped."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  publish-marketplace:
    name: Publish Marketplace
    runs-on: ubuntu-latest
    needs: check-publish-config
    if: needs.check-publish-config.outputs.enabled == 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx semantic-release
